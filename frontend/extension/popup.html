<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');
  
  body { 
    width: 320px; 
    padding: 16px; 
    font-family: 'Outfit', sans-serif; 
    background: #09090b; 
    color: #f4f4f5; 
    margin: 0; 
  }
  
  .header { 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    margin-bottom: 16px; 
  }
  
  .logo { 
    width: 32px; 
    height: 32px; 
    background: linear-gradient(135deg, #ef4444 0%, #f97316 100%); 
    border-radius: 8px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
  }
  
  .logo svg { 
    width: 16px; 
    height: 16px; 
    fill: white; 
  }
  
  h2 { 
    margin: 0; 
    font-size: 18px; 
    font-weight: 600; 
    letter-spacing: -0.02em; 
  }
  
  .tag { 
    font-size: 10px; 
    background: rgba(255,255,255,0.1); 
    padding: 2px 6px; 
    border-radius: 99px; 
    color: #a1a1aa; 
    margin-left: 6px; 
    font-weight: 400;
  }

  .card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }

  .btn-primary { 
    width: 100%; 
    padding: 12px; 
    background: linear-gradient(135deg, #ef4444 0%, #f97316 100%); 
    color: white; 
    border: none; 
    border-radius: 10px; 
    cursor: pointer; 
    font-weight: 600; 
    font-size: 14px; 
    box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2);
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-primary:hover { 
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .btn-secondary { 
    width: 100%; 
    padding: 10px; 
    background: rgba(255, 255, 255, 0.05); 
    color: #e4e4e7; 
    border: 1px solid rgba(255, 255, 255, 0.1); 
    border-radius: 10px; 
    cursor: pointer; 
    font-weight: 500; 
    font-size: 13px; 
    margin-top: 8px;
    transition: all 0.2s;
  }

  .btn-secondary:hover { 
    background: rgba(255, 255, 255, 0.1); 
  }

  button:disabled { 
    opacity: 0.5; 
    cursor: not-allowed; 
    transform: none !important;
  }

  #status { 
    margin-top: 12px; 
    padding: 10px; 
    border-radius: 8px; 
    font-size: 12px; 
    display: none; 
    line-height: 1.4;
  }

  .success { background: rgba(34, 197, 94, 0.15); color: #4ade80; display: block; border: 1px solid rgba(34, 197, 94, 0.2); }
  .error { background: rgba(239, 68, 68, 0.15); color: #f87171; display: block; border: 1px solid rgba(239, 68, 68, 0.2); }
  .loading { background: rgba(168, 85, 247, 0.15); color: #c084fc; display: block; border: 1px solid rgba(168, 85, 247, 0.2); }
  
  #notes { 
    margin-top: 12px; 
    max-height: 220px; 
    overflow-y: auto; 
    font-size: 12px; 
    white-space: pre-wrap; 
    background: rgba(0, 0, 0, 0.3); 
    padding: 12px; 
    border-radius: 8px; 
    display: none; 
    line-height: 1.6; 
    border: 1px solid rgba(255,255,255,0.05);
    color: #d4d4d8;
  }
  
  .hint { 
    font-size: 10px; 
    color: #52525b; 
    margin-top: 12px; 
    text-align: center; 
    line-height: 1.4;
  }
  
  /* Custom simple scrollbar */
  #notes::-webkit-scrollbar { width: 4px; }
  #notes::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="white">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
      </svg>
    </div>
    <h2>YouNote<span class="tag">Extension</span></h2>
  </div>

  <div class="card">
    <button id="openStudioBtn" class="btn-primary">
      <span>Open in YouNote Studio</span>
    </button>
    <div class="hint">Launch interactive dashboard with video synchronization</div>
  </div>

  <div style="border-top: 1px solid rgba(255,255,255,0.08); margin: 14px 0;"></div>

  <button id="generateBtn" class="btn-secondary">Quick Summary Inside Popup</button>
  
  <div id="status"></div>
  <div id="notes"></div>
  
  <div class="hint">Requires local YouNote server running at localhost:5000</div>

  <script src="popup.js"></script>
</body>
</html>
